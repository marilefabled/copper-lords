<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dredwork-editor</title>
<style>
  :root {
    --ink: #1a1714;
    --ink-light: #2a2520;
    --ink-lighter: #3a3530;
    --parchment: #c8b89a;
    --parchment-dim: #8a7d6b;
    --parchment-dark: #5a5040;
    --blood: #8b2020;
    --blood-light: #b33030;
    --ember: #c4943a;
    --ember-dim: #9a7830;
    --green: #4a8a50;
    --blue: #4a6a9a;
    --font-body: 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    color: var(--parchment);
    font-family: var(--font-body);
    font-size: 14px;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--ink-light);
    border-right: 1px solid var(--ink-lighter);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--ink-lighter);
    text-align: center;
  }

  #sidebar-header h1 {
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--ember);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  #sidebar-header .subtitle {
    font-size: 11px;
    color: var(--parchment-dim);
  }

  #sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .nav-category {
    padding: 8px 16px 4px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ember-dim);
    text-transform: uppercase;
  }

  .nav-item {
    padding: 6px 16px 6px 24px;
    cursor: pointer;
    font-size: 13px;
    color: var(--parchment-dim);
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .nav-item:hover { background: var(--ink-lighter); color: var(--parchment); }
  .nav-item.active { background: var(--ink-lighter); color: var(--ember); border-left: 2px solid var(--ember); }

  .nav-item .badge {
    font-size: 10px;
    background: var(--ink-lighter);
    color: var(--parchment-dim);
    padding: 1px 5px;
    border-radius: 8px;
    margin-left: auto;
    flex-shrink: 0;
  }

  #sidebar-footer {
    padding: 8px 16px;
    border-top: 1px solid var(--ink-lighter);
  }

  #sidebar-footer button {
    width: 100%;
    padding: 8px;
    background: var(--ink-lighter);
    color: var(--parchment-dim);
    border: 1px solid var(--parchment-dark);
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  #sidebar-footer button:hover { background: var(--ember-dim); color: var(--ink); }

  /* ── Main Content ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #toolbar {
    padding: 10px 20px;
    background: var(--ink-light);
    border-bottom: 1px solid var(--ink-lighter);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #toolbar h2 {
    font-size: 16px;
    color: var(--ember);
    white-space: nowrap;
  }

  #search {
    flex: 1;
    max-width: 400px;
    padding: 6px 12px;
    background: var(--ink);
    border: 1px solid var(--ink-lighter);
    border-radius: 4px;
    color: var(--parchment);
    font-size: 13px;
    font-family: var(--font-body);
  }

  #search:focus { outline: none; border-color: var(--ember-dim); }
  #search::placeholder { color: var(--parchment-dark); }

  .toolbar-stats {
    font-size: 11px;
    color: var(--parchment-dim);
    white-space: nowrap;
  }

  .toolbar-btn {
    padding: 5px 12px;
    background: transparent;
    border: 1px solid var(--parchment-dark);
    border-radius: 4px;
    color: var(--parchment-dim);
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
  }

  .toolbar-btn:hover { background: var(--ink-lighter); color: var(--parchment); }
  .toolbar-btn.primary { border-color: var(--ember-dim); color: var(--ember); }
  .toolbar-btn.primary:hover { background: var(--ember-dim); color: var(--ink); }
  .toolbar-btn.add { border-color: var(--green); color: var(--green); }
  .toolbar-btn.add:hover { background: var(--green); color: #fff; }

  /* ── Content Area ── */
  #content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--parchment-dim);
    text-align: center;
    gap: 16px;
  }

  #welcome h2 { color: var(--ember); font-size: 20px; letter-spacing: 3px; }
  #welcome p { max-width: 500px; line-height: 1.6; }
  #welcome kbd {
    background: var(--ink-lighter);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 12px;
  }

  /* ── Entry Cards ── */
  .entry-group {
    margin-bottom: 24px;
    background: var(--ink-light);
    border: 1px solid var(--ink-lighter);
    border-radius: 6px;
    overflow: hidden;
  }

  .entry-header {
    padding: 10px 16px;
    background: var(--ink-lighter);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }

  .entry-header:hover { background: #4a4540; }

  .entry-id {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--blue);
  }

  .entry-title {
    font-size: 14px;
    color: var(--parchment);
    font-weight: 600;
  }

  .entry-category {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--parchment-dark);
    margin-left: auto;
    background: var(--ink);
    padding: 2px 8px;
    border-radius: 8px;
  }

  .entry-toggle {
    color: var(--parchment-dim);
    font-size: 12px;
    transition: transform 0.2s;
  }

  .entry-group.collapsed .entry-toggle { transform: rotate(-90deg); }
  .entry-group.collapsed .entry-fields { display: none; }

  .entry-fields { padding: 12px 16px; }

  .field-row {
    margin-bottom: 12px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .field-label {
    min-width: 120px;
    max-width: 120px;
    font-size: 11px;
    color: var(--parchment-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding-top: 8px;
    word-break: break-all;
  }

  .field-input {
    flex: 1;
    position: relative;
  }

  .field-input textarea {
    width: 100%;
    padding: 8px 10px;
    background: var(--ink);
    border: 1px solid var(--ink-lighter);
    border-radius: 4px;
    color: var(--parchment);
    font-family: var(--font-body);
    font-size: 13px;
    line-height: 1.5;
    resize: vertical;
    min-height: 36px;
    transition: border-color 0.15s;
  }

  .field-input textarea:focus { outline: none; border-color: var(--ember-dim); }
  .field-input textarea.modified { border-color: var(--ember); background: #1f1d18; }

  .field-actions {
    display: flex;
    gap: 4px;
    margin-top: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .field-input:hover .field-actions,
  .field-input:focus-within .field-actions { opacity: 1; }

  .field-actions button {
    padding: 2px 8px;
    background: transparent;
    border: 1px solid var(--ink-lighter);
    border-radius: 3px;
    color: var(--parchment-dim);
    cursor: pointer;
    font-size: 11px;
  }

  .field-actions .save-btn { border-color: var(--green); color: var(--green); }
  .field-actions .save-btn:hover { background: var(--green); color: #fff; }
  .field-actions .revert-btn:hover { background: var(--ink-lighter); color: var(--parchment); }

  .color-preview {
    margin-top: 4px;
    padding: 6px 10px;
    background: var(--ink);
    border-radius: 3px;
    font-size: 13px;
    line-height: 1.5;
    border: 1px solid var(--ink-lighter);
  }

  /* ── Reference Panel ── */
  #reference-panel {
    position: fixed;
    top: 0;
    right: -500px;
    width: 480px;
    height: 100vh;
    background: var(--ink-light);
    border-left: 2px solid var(--ember-dim);
    z-index: 100;
    transition: right 0.3s ease;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #reference-panel.open { right: 0; }

  #reference-panel .ref-header {
    padding: 16px 20px;
    background: var(--ink-lighter);
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--ink-lighter);
  }

  #reference-panel .ref-header h3 {
    color: var(--ember);
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #reference-panel .ref-close {
    background: none;
    border: none;
    color: var(--parchment-dim);
    cursor: pointer;
    font-size: 20px;
  }

  #reference-panel .ref-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .ref-section { margin-bottom: 24px; }

  .ref-section h4 {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--ember-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--ink-lighter);
  }

  .ref-table {
    width: 100%;
    font-size: 12px;
    border-collapse: collapse;
  }

  .ref-table td {
    padding: 4px 8px;
    border-bottom: 1px solid #2a2520;
    vertical-align: top;
  }

  .ref-table td:first-child {
    font-family: var(--font-mono);
    color: var(--ember);
    white-space: nowrap;
    width: 160px;
  }

  .ref-table td:last-child { color: var(--parchment-dim); }

  .ref-rules {
    list-style: none;
    padding: 0;
  }

  .ref-rules li {
    padding: 4px 0;
    color: var(--parchment-dim);
    font-size: 12px;
    border-bottom: 1px solid var(--ink-lighter);
  }

  .ref-rules li::before {
    content: '\2014';
    color: var(--ember-dim);
    margin-right: 8px;
  }

  /* ── Add Modal ── */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal {
    background: var(--ink-light);
    border: 1px solid var(--ink-lighter);
    border-radius: 8px;
    width: 600px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px;
  }

  .modal h3 {
    color: var(--ember);
    font-size: 16px;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }

  .modal-field { margin-bottom: 14px; }

  .modal-field label {
    display: block;
    font-size: 11px;
    color: var(--parchment-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .modal-field input, .modal-field textarea, .modal-field select {
    width: 100%;
    padding: 8px 10px;
    background: var(--ink);
    border: 1px solid var(--ink-lighter);
    border-radius: 4px;
    color: var(--parchment);
    font-family: var(--font-body);
    font-size: 13px;
  }

  .modal-field textarea { min-height: 60px; resize: vertical; }
  .modal-field select { cursor: pointer; }
  .modal-field input:focus, .modal-field textarea:focus, .modal-field select:focus {
    outline: none;
    border-color: var(--ember-dim);
  }

  .modal-field .hint {
    font-size: 11px;
    color: var(--parchment-dark);
    margin-top: 2px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .modal-actions button {
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    border: 1px solid var(--ink-lighter);
  }

  .modal-actions .cancel { background: transparent; color: var(--parchment-dim); }
  .modal-actions .cancel:hover { background: var(--ink-lighter); }
  .modal-actions .submit { background: var(--green); color: #fff; border-color: var(--green); }
  .modal-actions .submit:hover { filter: brightness(1.2); }

  .modal-check {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .modal-check input[type="checkbox"] {
    width: auto;
    accent-color: var(--ember);
  }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 20px;
    background: var(--green);
    color: #fff;
    border-radius: 6px;
    font-size: 13px;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  #toast.show { opacity: 1; }
  #toast.error { background: var(--blood); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--ink); }
  ::-webkit-scrollbar-thumb { background: var(--ink-lighter); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--parchment-dark); }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1 id="app-name">dredwork-editor</h1>
    <div class="subtitle" id="app-subtitle">Text Editor</div>
  </div>
  <div id="sidebar-nav"></div>
  <div id="sidebar-footer">
    <button onclick="toggleReference()">Reference Key</button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div id="toolbar">
    <h2 id="toolbar-title">Select a file</h2>
    <input type="text" id="search" placeholder="Search text..." oninput="filterEntries()">
    <span class="toolbar-stats" id="toolbar-stats"></span>
    <button class="toolbar-btn" id="btn-expand" onclick="toggleAll(false)" style="display:none">Expand All</button>
    <button class="toolbar-btn" id="btn-collapse" onclick="toggleAll(true)" style="display:none">Collapse All</button>
    <button class="toolbar-btn add" id="btn-add" onclick="showAddModal()" style="display:none">+ Add New</button>
  </div>
  <div id="content">
    <div id="welcome">
      <h2 id="welcome-heading">Text Editor</h2>
      <p id="welcome-desc">Select a file from the sidebar to begin editing.</p>
      <p id="welcome-tips"></p>
      <p id="welcome-footer" style="font-size:12px; color:var(--parchment-dark)"></p>
    </div>
    <div id="entries" style="display:none"></div>
  </div>
</div>

<!-- Reference Panel -->
<div id="reference-panel">
  <div class="ref-header">
    <h3>Reference Key</h3>
    <button class="ref-close" onclick="toggleReference()">&times;</button>
  </div>
  <div class="ref-body" id="ref-body"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ──
let currentFile = null;
let currentFileType = null;
let currentGroups = [];
let originalValues = {};
let appConfig = null;
let refData = null;
let colorWords = {};

function colorWord(word) {
  const clean = word.toLowerCase().replace(/^[,.:;!?"'()\[\]]+/, '').replace(/[,.:;!?"'()\[\]]+$/, '');
  return colorWords[clean];
}

function renderColorPreview(text) {
  if (!text || Object.keys(colorWords).length === 0) return '';
  const words = text.split(/(\s+)/);
  let html = '';
  for (const w of words) {
    if (/^\s+$/.test(w)) { html += w; continue; }
    const color = colorWord(w);
    if (color) {
      const [r, g, b] = color;
      html += `<span style="color:rgb(${r*255|0},${g*255|0},${b*255|0})">${esc(w)}</span>`;
    } else if (w.match(/^\{[a-z_]+\}$/)) {
      html += `<span style="color:var(--blue)">${esc(w)}</span>`;
    } else {
      html += esc(w);
    }
  }
  return html;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ──
async function init() {
  // Load config
  const cfgRes = await fetch('/api/config');
  appConfig = await cfgRes.json();

  // Apply branding
  document.title = `${appConfig.name} ${appConfig.subtitle}`;
  document.getElementById('app-name').textContent = appConfig.name;
  document.getElementById('app-subtitle').textContent = appConfig.subtitle;

  // Apply welcome
  if (appConfig.welcome) {
    if (appConfig.welcome.heading) document.getElementById('welcome-heading').textContent = appConfig.welcome.heading;
    if (appConfig.welcome.description) document.getElementById('welcome-desc').textContent = appConfig.welcome.description;
    if (appConfig.welcome.tips) document.getElementById('welcome-tips').innerHTML =
      appConfig.welcome.tips.replace(/Ctrl\+S/g, '<kbd>Ctrl+S</kbd>').replace(/Reference Key/g, '<kbd>Reference Key</kbd>');
    if (appConfig.welcome.footer) document.getElementById('welcome-footer').textContent = appConfig.welcome.footer;
  }

  // Color words
  colorWords = appConfig.colorWords || {};

  // Load file registry
  const res = await fetch('/api/files');
  const { categories } = await res.json();
  const nav = document.getElementById('sidebar-nav');
  let html = '';

  for (const [cat, files] of Object.entries(categories)) {
    html += `<div class="nav-category">${cat}</div>`;
    for (const f of files) {
      html += `<div class="nav-item" data-path="${f.path}" data-type="${f.type}" onclick="loadFile('${f.path}','${f.type}',this)">
        ${f.label}
      </div>`;
    }
  }
  nav.innerHTML = html;

  // Load reference
  const refRes = await fetch('/api/reference');
  refData = await refRes.json();
  renderReference();
}

// ── Load File ──
async function loadFile(filePath, fileType, navEl) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (navEl) navEl.classList.add('active');

  currentFile = filePath;
  currentFileType = fileType;
  originalValues = {};

  document.getElementById('toolbar-title').textContent = filePath.split('/').pop().replace('.lua', '');
  document.getElementById('search').value = '';

  const res = await fetch('/api/parse', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ filePath, fileType }),
  });

  const data = await res.json();
  if (data.error) { toast(data.error, true); return; }

  currentGroups = data.groups;
  renderEntries(data.groups);

  let totalFields = 0;
  for (const g of data.groups) totalFields += g.fields.length;

  document.getElementById('toolbar-stats').textContent =
    `${data.groups.length} entries \u00b7 ${totalFields} text fields \u00b7 ${data.lineCount} lines`;

  document.getElementById('welcome').style.display = 'none';
  document.getElementById('entries').style.display = 'block';
  document.getElementById('btn-expand').style.display = '';
  document.getElementById('btn-collapse').style.display = '';

  const reg = await fetch('/api/files').then(r => r.json());
  let addable = false;
  for (const files of Object.values(reg.categories)) {
    for (const f of files) {
      if (f.path === filePath && f.addable) addable = true;
    }
  }
  document.getElementById('btn-add').style.display = addable ? '' : 'none';
}

// ── Render Entries ──
function renderEntries(groups) {
  const container = document.getElementById('entries');
  let html = '';

  for (let gi = 0; gi < groups.length; gi++) {
    const g = groups[gi];
    html += `<div class="entry-group" data-group="${gi}" id="group-${gi}">`;
    html += `<div class="entry-header" onclick="toggleGroup(${gi})">`;
    html += `<span class="entry-toggle">&#9660;</span>`;
    html += `<span class="entry-id">${esc(g.id)}</span>`;
    html += `<span class="entry-title">${esc(g.title)}</span>`;
    if (g.category) html += `<span class="entry-category">${esc(g.category)}</span>`;
    html += `</div>`;
    html += `<div class="entry-fields">`;

    for (let fi = 0; fi < g.fields.length; fi++) {
      const f = g.fields[fi];
      const key = `${gi}_${fi}`;
      originalValues[key] = f.value;

      const rows = Math.max(1, Math.min(5, Math.ceil(f.value.length / 80)));

      html += `<div class="field-row" data-field="${key}">`;
      html += `<div class="field-label">${esc(f.field)}</div>`;
      html += `<div class="field-input">`;
      html += `<textarea id="ta-${key}" rows="${rows}" data-key="${key}" data-gi="${gi}" data-fi="${fi}" oninput="onFieldChange('${key}')">${esc(f.value)}</textarea>`;
      html += `<div class="field-actions">`;
      html += `<button class="save-btn" onclick="saveField('${key}')">Save</button>`;
      html += `<button class="revert-btn" onclick="revertField('${key}')">Revert</button>`;
      html += `</div>`;
      if (Object.keys(colorWords).length > 0) {
        html += `<div class="color-preview" id="cp-${key}">${renderColorPreview(f.value)}</div>`;
      }
      html += `</div>`;
      html += `</div>`;
    }

    html += `</div></div>`;
  }

  container.innerHTML = html;
}

// ── Field Actions ──
function onFieldChange(key) {
  const ta = document.getElementById(`ta-${key}`);
  const isModified = ta.value !== originalValues[key];
  ta.classList.toggle('modified', isModified);

  const cp = document.getElementById(`cp-${key}`);
  if (cp) cp.innerHTML = renderColorPreview(ta.value);
}

async function saveField(key) {
  const ta = document.getElementById(`ta-${key}`);
  const [gi, fi] = key.split('_').map(Number);
  const field = currentGroups[gi].fields[fi];

  try {
    const res = await fetch('/api/edit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        file: field.file,
        start: field.start,
        end: field.end,
        raw: field.raw,
        newValue: ta.value,
      }),
    });

    const data = await res.json();
    if (data.error) { toast(data.error, true); return; }

    field.raw = data.newRaw;
    field.value = ta.value;
    field.end = field.start + data.newRaw.length;
    originalValues[key] = ta.value;
    ta.classList.remove('modified');
    toast('Saved');

    reloadCurrentFile();
  } catch (e) {
    toast('Save failed: ' + e.message, true);
  }
}

function revertField(key) {
  const ta = document.getElementById(`ta-${key}`);
  ta.value = originalValues[key];
  ta.classList.remove('modified');
  const cp = document.getElementById(`cp-${key}`);
  if (cp) cp.innerHTML = renderColorPreview(originalValues[key]);
}

async function reloadCurrentFile() {
  if (currentFile) {
    const active = document.querySelector('.nav-item.active');
    await loadFile(currentFile, currentFileType, active);
  }
}

// ── Toggle Groups ──
function toggleGroup(gi) {
  const el = document.getElementById(`group-${gi}`);
  el.classList.toggle('collapsed');
}

function toggleAll(collapse) {
  document.querySelectorAll('.entry-group').forEach(el => {
    el.classList.toggle('collapsed', collapse);
  });
}

// ── Search / Filter ──
function filterEntries() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.entry-group').forEach(el => {
    const gi = parseInt(el.dataset.group);
    const g = currentGroups[gi];
    if (!q) { el.style.display = ''; return; }

    let match = g.id.toLowerCase().includes(q) ||
                g.title.toLowerCase().includes(q) ||
                (g.category && g.category.toLowerCase().includes(q));

    if (!match) {
      for (const f of g.fields) {
        const ta = document.getElementById(`ta-${gi}_${g.fields.indexOf(f)}`);
        if (ta && ta.value.toLowerCase().includes(q)) { match = true; break; }
        if (f.value.toLowerCase().includes(q)) { match = true; break; }
      }
    }

    el.style.display = match ? '' : 'none';
    if (match && q) el.classList.remove('collapsed');
  });
}

// ── Reference Panel ──
function toggleReference() {
  document.getElementById('reference-panel').classList.toggle('open');
}

function renderReference() {
  if (!refData) return;
  const body = document.getElementById('ref-body');
  let html = '';

  // Generic: iterate over reference sections
  // Each section is { title, type, items }
  // type: 'table' (items: [{col1, col2}]), 'rules' (items: string[]), 'text' (items: string)
  for (const [key, section] of Object.entries(refData)) {
    if (!section || typeof section !== 'object') continue;

    // Handle array of {var/axis/field/cat + desc/name/high/low} tables
    if (Array.isArray(section)) {
      const title = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      html += `<div class="ref-section"><h4>${esc(title)}</h4><table class="ref-table">`;
      for (const item of section) {
        const label = item.var || item.axis || item.field || item.cat || item.name || '';
        let desc = item.desc || item.description || '';
        if (item.name && item.high) {
          desc = `<strong>${esc(item.name)}</strong><br>High: ${esc(item.high)}<br>Low: ${esc(item.low)}`;
          html += `<tr><td>${esc(label)}</td><td>${desc}</td></tr>`;
        } else {
          html += `<tr><td>${esc(label)}</td><td>${esc(desc)}</td></tr>`;
        }
      }
      html += `</table></div>`;
    }
    // Handle voice_style object { tone, rules[] }
    else if (section.tone && section.rules) {
      html += `<div class="ref-section"><h4>Writing Voice</h4>`;
      html += `<p style="color:var(--parchment-dim);font-size:12px;margin-bottom:8px">${esc(section.tone)}</p>`;
      html += `<ul class="ref-rules">`;
      for (const r of section.rules) {
        html += `<li>${esc(r)}</li>`;
      }
      html += `</ul></div>`;
    }
  }

  body.innerHTML = html;
}

// ── Add Modal ──
function showAddModal() {
  if (!currentFile || !currentFileType) return;

  let html = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">`;
  html += `<div class="modal">`;
  html += `<h3>Add New Entry</h3>`;

  // Generic fields based on file type
  html += field('id', 'Unique ID', 'input', 'snake_case_name', 'Must be unique');
  html += field('title', 'Title', 'input', 'Entry Title');
  html += field('narrative', 'Narrative', 'textarea', 'Main text content...');
  html += field('text', 'Text', 'textarea', 'Content text...');

  // Pool selector if pools type
  if (currentFileType === 'pools') {
    const pools = [...new Set(currentGroups.map(g => g.id))];
    html += `<div class="modal-field"><label>Pool</label><select id="add-pool">`;
    for (const p of pools) {
      html += `<option value="${p}">${p.replace(/_/g, ' ')}</option>`;
    }
    html += `</select></div>`;
  }

  // Legend selector if legends type
  if (currentFileType === 'legends') {
    const legends = currentGroups.map(g => g.id);
    html += `<div class="modal-field"><label>Legend</label><select id="add-legendId">`;
    for (const l of legends) {
      html += `<option value="${l}">${l.replace(/_/g, ' ')}</option>`;
    }
    html += `</select></div>`;
  }

  html += `<div class="modal-actions">`;
  html += `<button class="cancel" onclick="closeModal()">Cancel</button>`;
  html += `<button class="submit" onclick="submitAdd()">Add Entry</button>`;
  html += `</div>`;
  html += `</div></div>`;

  document.body.insertAdjacentHTML('beforeend', html);
}

function field(id, label, type, placeholder, hint) {
  let html = `<div class="modal-field"><label>${label}</label>`;
  if (type === 'textarea') {
    html += `<textarea id="add-${id}" placeholder="${placeholder || ''}"></textarea>`;
  } else {
    html += `<input id="add-${id}" type="text" placeholder="${placeholder || ''}">`;
  }
  if (hint) html += `<div class="hint">${hint}</div>`;
  html += `</div>`;
  return html;
}

function closeModal() {
  const overlay = document.querySelector('.modal-overlay');
  if (overlay) overlay.remove();
}

async function submitAdd() {
  const data = {};
  const fields = ['id', 'title', 'narrative', 'trigger_axis', 'trigger_min', 'consequence',
    'label', 'description', 'category', 'pool', 'text', 'legendId',
    'opt1_label', 'opt1_desc', 'opt1_narrative', 'opt2_label', 'opt2_desc', 'opt2_narrative'];

  for (const f of fields) {
    const el = document.getElementById(`add-${f}`);
    if (el) data[f] = el.value;
  }

  const hasOpts = document.getElementById('add-hasOptions');
  if (hasOpts) data.hasOptions = hasOpts.checked;

  try {
    const res = await fetch('/api/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filePath: currentFile, fileType: currentFileType, data }),
    });

    const result = await res.json();
    if (result.error) { toast(result.error, true); return; }

    closeModal();
    toast('Entry added');
    reloadCurrentFile();
  } catch (e) {
    toast('Add failed: ' + e.message, true);
  }
}

// ── Toast ──
function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = isError ? 'show error' : 'show';
  setTimeout(() => el.className = '', 2500);
}

// ── Keyboard Shortcuts ──
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    const focused = document.activeElement;
    if (focused && focused.tagName === 'TEXTAREA' && focused.dataset.key) {
      saveField(focused.dataset.key);
    }
  }

  if (e.key === 'Escape') {
    const modal = document.querySelector('.modal-overlay');
    if (modal) { closeModal(); return; }
    const ref = document.getElementById('reference-panel');
    if (ref.classList.contains('open')) toggleReference();
  }
});

// ── Boot ──
init();
</script>
</body>
</html>
